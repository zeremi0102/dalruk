<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>캐릭터 캘린더 체크리스트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-viewport" id="appViewport">
    <div class="app-frame" id="appFrame">
      <div class="app-shell" id="appShell">
        <header class="top-panel">
          <aside class="side-card left-actions">
            <h2>캐릭터 액션</h2>
            <div class="action-grid">
              <button class="action-button" data-action="1">버튼 1</button>
              <button class="action-button" data-action="2">버튼 2</button>
              <button class="action-button" data-action="3">버튼 3</button>
              <button class="action-button" data-action="4">버튼 4</button>
              <button class="action-button" data-action="5">버튼 5</button>
              <button class="action-button" data-action="6">버튼 6</button>
            </div>
          </aside>

          <section class="character-stage">
            <div class="stage-header">
              <div>
                <p class="eyebrow">Character Space</p>
                <h1>캐릭터 상호작용 공간</h1>
              </div>
              <label class="auto-play">
                <input type="checkbox" id="autoBehaviorToggle">
                <span>자동 행동</span>
              </label>
            </div>

            <div class="character-area" id="characterArea">
              <div class="character-halo"></div>
              <img
                id="characterImage"
                class="character-image"
                alt="캐릭터 이미지"
                src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=500&q=80"
              >
            </div>

            <div class="speech-box">
              <p id="speechText">안녕하세요. 오늘의 일정과 체크리스트를 함께 관리해볼까요?</p>
            </div>
          </section>

          <aside class="side-card right-controls">
            <h2>캐릭터 설정</h2>
            <button id="personalityButton" class="primary-button">성격 선택</button>
            <div id="personalityPanel" class="personality-panel hidden">
              <label><input type="radio" name="personality" value="friendly" checked> 다정함</label>
              <label><input type="radio" name="personality" value="playful"> 장난기</label>
              <label><input type="radio" name="personality" value="calm"> 차분함</label>
              <label><input type="radio" name="personality" value="energetic"> 활발함</label>
            </div>

            <label for="characterUpload" class="primary-button upload-button">캐릭터 추가/변경</label>
            <input id="characterUpload" type="file" accept="image/*" hidden>

            <div class="status-card">
              <span>현재 성격</span>
              <strong id="currentPersonalityLabel">다정함</strong>
            </div>
          </aside>
        </header>

        <main class="main-panel">
          <aside class="memo-panel">
            <div class="panel-title">
              <p class="eyebrow">Memo</p>
              <h2 id="selectedDateTitle">날짜를 선택해 주세요</h2>
            </div>

            <label class="field-label" for="taskInput">체크리스트 추가</label>
            <div class="task-form">
              <input id="taskInput" type="text" placeholder="예: 운동 30분 하기">
              <button id="addTaskButton" class="primary-button">추가</button>
            </div>

            <ul id="taskList" class="task-list"></ul>

            <label class="field-label" for="memoInput">메모</label>
            <textarea id="memoInput" placeholder="선택한 날짜에 대한 메모를 적어주세요."></textarea>
          </aside>

          <section class="calendar-panel">
            <div class="calendar-header">
              <button id="prevMonth" class="nav-button" aria-label="이전 달">&lt;</button>
              <div>
                <p class="eyebrow">Galaxy-style Calendar</p>
                <h2 id="monthLabel"></h2>
              </div>
              <button id="nextMonth" class="nav-button" aria-label="다음 달">&gt;</button>
            </div>

            <div id="monthView" class="month-view"></div>
            <div id="agendaView" class="agenda-view hidden"></div>
          </section>

          <aside class="view-panel">
            <div class="panel-title">
              <p class="eyebrow">View</p>
              <h2>보기 전환</h2>
            </div>
            <button id="toggleViewButton" class="primary-button wide-button">표 보기로 전환</button>
            <p class="helper-text">버튼을 누르면 중앙 달력이 월간 캘린더에서 세로 표 형태로 바뀝니다.</p>
          </aside>
        </main>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
